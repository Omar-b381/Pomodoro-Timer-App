<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤقت بومودورو الاحترافي</title>
    <style>
        /* 
         * =========================================
         * CSS Variables & Global Styles
         * =========================================
         */
        :root {
            --primary-color: #ff6b6b; /* لون التركيز */
            --secondary-color: #4ecdc4; /* لون الاستراحة القصيرة */
            --tertiary-color: #45b7d1; /* لون الاستراحة الطويلة */
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --text-light: #95a5a6;
            --shadow: 0 10px 20px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* =========================================
         * Timer Card Design
         * ========================================= */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            text-align: center;
            transition: var(--transition);
        }

        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: transparent;
            border: 2px solid transparent;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: var(--transition);
        }

        .mode-btn.active {
            background-color: rgba(0,0,0,0.05);
            color: var(--text-color);
            border-color: var(--text-color);
        }

        .timer-display {
            font-size: 6rem;
            font-weight: 700;
            margin: 20px 0;
            font-variant-numeric: tabular-nums; /* ثبات عرض الأرقام */
            color: var(--primary-color);
        }

        /* تغيير لون المؤقت بناءً على الحالة */
        body[data-mode="short"] .timer-display { color: var(--secondary-color); }
        body[data-mode="long"] .timer-display { color: var(--tertiary-color); }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        body[data-mode="short"] .btn-primary { background-color: var(--secondary-color); }
        body[data-mode="long"] .btn-primary { background-color: var(--tertiary-color); }

        .btn-secondary {
            background-color: #e0e0e0;
            color: var(--text-color);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }

        .mute-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        /* =========================================
         * Stats Section Design
         * ========================================= */
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .filter-select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .history-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }
        
        .history-time { color: var(--text-light); font-size: 0.8rem; }

        @media (max-width: 480px) {
            .timer-display { font-size: 4rem; }
            .btn { padding: 10px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body data-mode="focus">

    <div class="container">
        <!-- قسم المؤقت -->
        <section class="card">
            <button id="muteBtn" class="mute-toggle" title="كتم/تفعيل الصوت">🔔</button>
            
            <div class="mode-tabs">
                <button class="mode-btn active" data-time="25" data-mode="focus">تركيز</button>
                <button class="mode-btn" data-time="5" data-mode="short">استراحة قصيرة</button>
                <button class="mode-btn" data-time="15" data-mode="long">استراحة طويلة</button>
            </div>

            <div class="timer-display" id="timer">25:00</div>

            <div class="controls">
                <button id="startBtn" class="btn btn-primary">ابدأ</button>
                <button id="pauseBtn" class="btn btn-secondary" style="display: none;">إيقاف مؤقت</button>
                <button id="resetBtn" class="btn btn-secondary">إعادة تعيين</button>
            </div>
        </section>

        <!-- قسم الإحصائيات -->
        <section class="card">
            <div class="stats-header">
                <h3>سجل النشاط</h3>
                <select id="filterSelect" class="filter-select">
                    <option value="today">اليوم</option>
                    <option value="week">هذا الأسبوع</option>
                    <option value="month">هذا الشهر</option>
                </select>
            </div>

            <div class="stats-summary">
                <div class="stat-box">
                    <div class="stat-value" id="totalSessions">0</div>
                    <div class="stat-label">جلسات مكتملة</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="totalTime">0 د</div>
                    <div class="stat-label">إجمالي التركيز</div>
                </div>
            </div>

            <ul id="historyList" class="history-list">
                <!-- سيتم ملء القائمة بواسطة JavaScript -->
            </ul>
        </section>
    </div>

    <script>
        /**
         * =========================================
         * Application State & Configuration
         * =========================================
         */
        const AppState = {
            timeLeft: 25 * 60,
            originalTime: 25 * 60,
            timerId: null,
            isRunning: false,
            currentMode: 'focus', // focus, short, long
            isMuted: false,
            history: []
        };

        const MODES = {
            focus: { time: 25, label: 'تركيز' },
            short: { time: 5, label: 'استراحة قصيرة' },
            long: { time: 15, label: 'استراحة طويلة' }
        };

        // DOM Elements
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const muteBtn = document.getElementById('muteBtn');
        const filterSelect = document.getElementById('filterSelect');
        const historyList = document.getElementById('historyList');
        const totalSessionsEl = document.getElementById('totalSessions');
        const totalTimeEl = document.getElementById('totalTime');

        /**
         * =========================================
         * Audio System (Web Audio API)
         * =========================================
         * Creates a beep sound without external files
         */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playAlarm() {
            if (AppState.isMuted) return;

            // استئناف سياق الصوت إذا كان معلقاً (سياسة المتصفح)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // تردد A5
            oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        /**
         * =========================================
         * Timer Logic
         * =========================================
         */
        function updateDisplay() {
            const minutes = Math.floor(AppState.timeLeft / 60);
            const seconds = AppState.timeLeft % 60;
            const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            timerDisplay.textContent = timeString;
            
            // تحديث عنوان التبويب
            const modeLabel = MODES[AppState.currentMode].label;
            document.title = `(${timeString}) ${modeLabel} - بومودورو`;
        }

        function startTimer() {
            if (AppState.isRunning) return;
            
            // تفعيل سياق الصوت عند أول تفاعل
            if (audioCtx.state === 'suspended') audioCtx.resume();

            AppState.isRunning = true;
            toggleControls(true);

            AppState.timerId = setInterval(() => {
                if (AppState.timeLeft > 0) {
                    AppState.timeLeft--;
                    updateDisplay();
                } else {
                    completeSession();
                }
            }, 1000);
        }

        function pauseTimer() {
            AppState.isRunning = false;
            clearInterval(AppState.timerId);
            toggleControls(false);
        }

        function resetTimer() {
            pauseTimer();
            AppState.timeLeft = AppState.originalTime;
            updateDisplay();
        }

        function switchMode(mode) {
            pauseTimer();
            AppState.currentMode = mode;
            AppState.originalTime = MODES[mode].time * 60;
            AppState.timeLeft = AppState.originalTime;
            
            // تحديث الواجهة
            document.body.setAttribute('data-mode', mode);
            modeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            
            updateDisplay();
        }

        function completeSession() {
            pauseTimer();
            playAlarm();
            
            // حفظ الجلسة فقط إذا كانت "تركيز" (عادة ما نتبع وقت التركيز فقط)
            // ولكن هنا سنحفظ كل الجلسات ونفلتر لاحقاً
            const session = {
                id: Date.now(),
                date: new Date().toISOString(),
                mode: AppState.currentMode,
                durationMinutes: MODES[AppState.currentMode].time
            };

            saveToHistory(session);
            loadHistory(); // تحديث العرض
            alert('انتهى الوقت!');
        }

        function toggleControls(isRunning) {
            startBtn.style.display = isRunning ? 'none' : 'inline-block';
            pauseBtn.style.display = isRunning ? 'inline-block' : 'none';
        }

        /**
         * =========================================
         * Data Persistence & Statistics
         * =========================================
         */
        function saveToHistory(session) {
            AppState.history.push(session);
            localStorage.setItem('pomodoroHistory', JSON.stringify(AppState.history));
        }

        function loadStorage() {
            const stored = localStorage.getItem('pomodoroHistory');
            if (stored) {
                AppState.history = JSON.parse(stored);
            }
        }

        /**
         * دوال مساعدة للتاريخ (Date Helper Functions)
         * منطق دقيق لتحديد نطاقات الوقت
         */
        const DateUtils = {
            isToday: (date) => {
                const d = new Date(date);
                const today = new Date();
                return d.getDate() === today.getDate() &&
                       d.getMonth() === today.getMonth() &&
                       d.getFullYear() === today.getFullYear();
            },
            
            isThisWeek: (date) => {
                const d = new Date(date);
                const now = new Date();
                // نفترض بداية الأسبوع هو السبت أو الأحد حسب الإعداد المحلي، 
                // لكن للكود العام سنجعل "الأسبوع الحالي" يعني آخر 7 أيام أو الأسبوع التقويمي
                // هنا نستخدم منطق: التاريخ يقع في نفس أسبوع السنة الحالية
                const startOfWeek = new Date(now);
                startOfWeek.setHours(0,0,0,0);
                startOfWeek.setDate(now.getDate() - now.getDay()); // العودة ليوم الأحد
                
                const endOfWeek = new Date(startOfWeek);
                endOfWeek.setDate(startOfWeek.getDate() + 7);
                
                return d >= startOfWeek && d < endOfWeek;
            },

            isThisMonth: (date) => {
                const d = new Date(date);
                const now = new Date();
                return d.getMonth() === now.getMonth() &&
                       d.getFullYear() === now.getFullYear();
            }
        };

        function renderHistory() {
            const filter = filterSelect.value;
            historyList.innerHTML = '';
            
            let totalFocusTime = 0;
            let sessionCount = 0;

            // فلترة وترتيب البيانات (الأحدث أولاً)
            const filteredData = AppState.history
                .filter(item => {
                    // نركز الإحصائيات عادة على جلسات "التركيز" فقط
                    if (item.mode !== 'focus') return false;

                    if (filter === 'today') return DateUtils.isToday(item.date);
                    if (filter === 'week') return DateUtils.isThisWeek(item.date);
                    if (filter === 'month') return DateUtils.isThisMonth(item.date);
                    return true;
                })
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            // حساب المجاميع وعرض القائمة
            filteredData.forEach(session => {
                sessionCount++;
                totalFocusTime += session.durationMinutes;

                const dateObj = new Date(session.date);
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span>جلسة تركيز</span>
                    <span class="history-time">
                        ${dateObj.toLocaleDateString('ar-EG')} - ${dateObj.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}
                    </span>
                `;
                historyList.appendChild(li);
            });

            // تحديث لوحة المعلومات
            totalSessionsEl.textContent = sessionCount;
            totalTimeEl.textContent = `${totalFocusTime} دقيقة`;
            
            if(sessionCount === 0) {
                historyList.innerHTML = '<li style="text-align:center; padding:10px; color:#999;">لا توجد جلسات في هذه الفترة</li>';
            }
        }

        // Wrapper to ensure data is loaded before render
        function loadHistory() {
            renderHistory();
        }

        /**
         * =========================================
         * Event Listeners & Initialization
         * =========================================
         */
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        modeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const mode = e.target.dataset.mode;
                switchMode(mode);
            });
        });

        muteBtn.addEventListener('click', () => {
            AppState.isMuted = !AppState.isMuted;
            muteBtn.textContent = AppState.isMuted ? '🔕' : '🔔';
        });

        filterSelect.addEventListener('change', renderHistory);

        // البدء
        window.addEventListener('DOMContentLoaded', () => {
            loadStorage();
            updateDisplay(); // العرض الأولي
            loadHistory();   // تحميل التاريخ
        });

    </script>
</body>
</html>
